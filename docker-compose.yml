services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sweetdreams}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sweetdreams}
      POSTGRES_DB: ${POSTGRES_DB:-sweetdreams}
    volumes:
      # Bind mount, not a named volume: on Synology this should point at
      # /volume1/docker/sweetdreams/postgres (set DATA_DIR in .env), so Hyper
      # Backup can protect it like any other shared-folder path.
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    ports:
      # Loopback-only: reachable from the host for psql/debugging, never from
      # the LAN or the tunnel. The app talks to it over the compose network,
      # not through this published port, so it's fine to move if 5432 is
      # already taken on the host (e.g. by another package's own Postgres).
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sweetdreams}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Overrides the localhost default in backend/.env.example: inside
      # compose the DB is reachable at the service name, not localhost.
      DATABASE_URL: postgres://${POSTGRES_USER:-sweetdreams}:${POSTGRES_PASSWORD:-sweetdreams}@postgres:5432/${POSTGRES_DB:-sweetdreams}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Loopback-only: DSM's own reverse proxy (or a Cloudflare Tunnel
      # container) forwards 443 to this, nothing else should reach it
      # directly. Host-side port is configurable since 3000 is a common
      # default other services on the same host may already be using.
      - "127.0.0.1:${APP_HOST_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    # Serves the static site (.dc.html files, images, sd-*.js) and proxies
    # /api/* to the app service - see scripts/dev-server.js. Stock node
    # image, no build step: the repo root is bind-mounted read-only instead
    # of copied into an image, so a plain `git pull` on the host takes
    # effect immediately, no rebuild needed for static content changes.
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /site
    command: ["node", "scripts/dev-server.js"]
    environment:
      PORT: 3000
      API_HOST: app
      API_PORT: 3000
    volumes:
      - .:/site:ro
    depends_on:
      app:
        condition: service_healthy
    ports:
      # Loopback-only, same posture as the app service - nothing public
      # until the Cloudflare Tunnel/reverse proxy work happens. This is the
      # one port a tunnel would eventually point at, since it fronts both
      # the static files and the API under one origin.
      - "127.0.0.1:${WEB_HOST_PORT:-4321}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
